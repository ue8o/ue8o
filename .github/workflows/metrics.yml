name: Metrics

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - github-metrics.svg

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: github-metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: update GitHub metrics [skip ci]"

          template: classic
          base: header, activity
          config_order: base.header, base.activity, lines, music, wakatime, traffic
          plugin_lines: yes
          plugin_isocalendar: no
          plugin_traffic: yes

          plugin_music: yes
          plugin_music_provider: lastfm
          plugin_music_mode: recent
          plugin_music_token: ${{ secrets.LASTFM_TOKEN }}
          plugin_music_user: jhhzwiep

          plugin_wakatime: yes
          plugin_wakatime_days: 30
          plugin_wakatime_limit: 5
          plugin_wakatime_repositories_visibility: public
          plugin_wakatime_sections: editors, time, languages
          plugin_wakatime_url: https://wakatime.com
          plugin_wakatime_user: current
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}

          extras_css: |
            h1, h2, h3, .blue,
            .repository .name span:first-child,
            .activity .repo,
            .activity .issue,
            .activity .commit .sha,
            .stackoverflow .title {
              color: #f78166 !important;
              fill: #f78166 !important;
            }
            .label {
              color: #f78166 !important;
              background-color: #f7816630 !important;
            }
            .ct-line {
              stroke: #f78166 !important;
            }
            .ct-area {
              fill: #f78166 !important;
            }
